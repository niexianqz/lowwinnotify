<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xian RoV Boosting Update</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 450px; border-top: 4px solid #06C755; }
        h2 { color: #06C755; text-align: center; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
        p.sub { text-align: center; color: #aaa; font-size: 0.85em; margin-bottom: 20px; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #06C755; outline: none; }
        textarea { height: 80px; resize: none; }
        
        .upload-area { margin: 15px 0; border: 2px dashed #444; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .upload-area:hover { border-color: #06C755; color: #06C755; }
        input[type="file"] { display: none; }
        #preview { width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 1px solid #444; }
        
        button { width: 100%; background: #06C755; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        button:hover { background: #05a346; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(6, 199, 85, 0.4); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; color: #888; box-shadow: none; }
        
        .footer { text-align: center; font-size: 0.7em; margin-top: 20px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2> RoV Service Update</h2>
    <p class="sub">Lowwinrate System</p>
    
    <div class="input-group">
        <input type="text" id="userPlayer" placeholder="User : (ชื่อในเกม หรือ ID)">
        <input type="number" id="matchCount" placeholder="จำนวนรอบ : (เช่น 5)">
        <input type="text" id="winRate" placeholder="เปอร์เซ็นวินเรท : (เช่น 80% หรือ 4/5)">
    </div>

    <textarea id="msgInput" placeholder="รายละเอียดเพิ่มเติม... (เช่น เล่นเสร็จเรียบร้อยครับ)"></textarea>
    
    <div class="upload-area" onclick="document.getElementById('imageFile').click()">
        <span id="uploadText"> Click to attach screenshot (แนบรูปผลประวัติการเล่น)</span>
        <input type="file" id="imageFile" accept="image/*" onchange="showPreview(event)">
        <img id="preview">
    </div>

    <button id="sendBtn" onclick="processAndSend()">Send Update</button>
    <div class="footer">Powered by Xian</div>
</div>

<script>
    const IMGBB_API_KEY = '7ed0fc9a8839fbd8241afa7a57c225fc'; 
    // 🚩 อย่าลืมเอา URL จาก Google Script (GAS_URL) มาใส่ตรงนี้เหมือนเดิมนะครับ
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx0NaJlHSpJe2dKii-CefJsZNJMyUQ94kG-9VN4rIPqjCjfv5pycB2QURRPS0_XR2Wf/exec';

    function showPreview(event) {
        const file = event.target.files[0];
        if (file) {
            const preview = document.getElementById('preview');
            const uploadText = document.getElementById('uploadText');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            uploadText.style.display = 'none';
        }
    }

    async function processAndSend() {
        const userPlayer = document.getElementById('userPlayer').value || '-';
        const matchCount = document.getElementById('matchCount').value || '-';
        const winRate = document.getElementById('winRate').value || '-';
        const msgInput = document.getElementById('msgInput').value;
        const fileInput = document.getElementById('imageFile');
        const btn = document.getElementById('sendBtn');
        
        btn.disabled = true;
        btn.innerText = 'Processing...';

        try {
            let finalImageUrl = "";
            
            // 1. อัพโหลดรูปไป ImgBB (ถ้ามีการแนบสลิปหรือรูปผลเกม)
            if (fileInput.files.length > 0) {
                btn.innerText = 'Uploading Image...';
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                
                const imgResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const imgData = await imgResponse.json();
                finalImageUrl = imgData.data.url;
            }

            // 2. ดึงเวลา Format ภาษาอังกฤษ
            const now = new Date();
            const timeOptions = { month: 'short', day: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
            const timeStr = now.toLocaleString('en-US', timeOptions);
            
            // 3. ประกอบข้อความส่งเข้า LINE
            let finalMessage = `🎮 RoV Low Winrate Update\n`;
            finalMessage += `👤 User: ${userPlayer}\n`;
            finalMessage += `⚔️ จำนวนรอบ: ${matchCount}\n`;
            finalMessage += `🏆 วินเรท: ${winRate}\n`;
            
            if(msgInput) {
                finalMessage += `\n📝 รายละเอียด:\n${msgInput}\n`;
            }

            finalMessage += `\n━━━━━━━━━━━━━━\n⏰ Last Update: ${timeStr}`;

            // 4. ยิงข้อมูลไปหา Google Apps Script
            btn.innerText = 'Sending to LINE...';
            const params = new URLSearchParams();
            params.append('text', finalMessage);
            params.append('imageUrl', finalImageUrl);

            await fetch(GAS_URL, {
                method: 'POST',
                body: params
            });

            alert('Update sent successfully! 🚀');
            location.reload(); 

        } catch (error) {
            console.error(error);
            alert('An error occurred. Please try again.');
            btn.disabled = false;
            btn.innerText = 'Send Update';
        }
    }
</script>

</body>
</html>
